server:
  port: 0

spring:
  application:
    name: organization-service-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  main:
    allow-bean-definition-overriding: true

axon:
  axonserver:
    enabled: false
  serializer:
    general: jackson

management:
  endpoints:
    web:
      exposure:
        include: health,info
