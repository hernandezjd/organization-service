server:
  port: 8084

spring:
  application:
    name: organization-service
  datasource:
    url: jdbc:postgresql://localhost:5432/organization_db
    username: org_user
    password: org_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${USER_SERVICE_ISSUER_URI:http://localhost:8085}

axon:
  axonserver:
    servers: localhost:8124

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    axon:
      enabled: true

app:
  cors:
    enabled: true
    allowed-origins: [http://localhost:5173, http://localhost:3000]
